<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typer Mundial 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f0f2f5; padding: 5px; margin: 0; }
        .typer-container { background: #fff; padding: 10px; border-radius: 12px; max-width: 1000px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 600px; }
        th { background: #1a3c6e; color: #fff; padding: 10px 5px; }
        td { padding: 8px 4px; border-bottom: 1px solid #eee; text-align: center; }
        
        input[type=number] { width: 30px; height: 30px; text-align: center; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; -moz-appearance: textfield; }
        input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .match-time { width: 85px; font-size: 0.75rem; padding: 4px; border: 1px solid #ccc; border-radius: 4px; }
        .real-field { background-color: #e9ecef !important; }
        .exact { background-color: #28a745 !important; color: white !important; }
        .win { background-color: #ffc107 !important; }
        .wrong { background-color: #dc3545 !important; color: white !important; }
        
        .ranking-table { width: 100%; margin: 20px 0; border-collapse: collapse; }
        .ranking-table td, .ranking-table th { border: 1px solid #ddd; padding: 8px; text-align: center; }
        
        .extra-fields { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .extra-fields input { padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
        
        .btn-save { width: 100%; padding: 18px; background: #1a3c6e; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; margin-top: 10px; }
        
        #countdown { text-align: center; font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; color: #1a3c6e; }
        .blink { animation: blinker 1s linear infinite; color: red !important; }
        @keyframes blinker { 50% { opacity: 0; } }
        input:read-only { background-color: #f8f9fa; cursor: not-allowed; }
        .finished-match { opacity: 0.6; background-color: #fafafa; }
        h1, h3, h4 { text-align: center; }
    </style>
</head>
<body>

<div class="typer-container">
    <div id="countdown">Ładowanie...</div>
    <h1>MUNDIAL 2026</h1>
    
    <div class="table-wrapper">
        <table>
            <thead><tr><th>Godz.</th><th>Mecz</th><th>Oniszk</th><th>Sebix</th><th>Adaś</th><th>Kuba</th><th>Maksym</th><th>Real</th></tr></thead>
            <tbody id="matchBody">
                <script>
                    const matches = ["Meksyk-RPA", "Korea Płd-Czechy", "Kanada-Bośnia", "USA-Paragwaj", "Katar-Szwajcaria", "Brazylia-Maroko", "Haiti-Szkocja", "Australia-Turcja", "Niemcy- Curacao", "Holandia- Japonia", "WKS- Ekwador", "Szwecja- Tunezja", "Hiszpania- Republika Zielonego Przylądka", "Belgia- Egipt"];
                    matches.forEach((m, idx) => {
                        document.write(`<tr data-match="${idx+1}" class="match-row">
                            <td><input type="text" class="match-time" placeholder="13.06.26 15:30" onblur="sortMatches()"></td>
                            <td><strong>${m}</strong></td>
                            ${[1,2,3,4,5].map(i => `<td><input type="number" class="p${i}-h" maxlength="1" oninput="calculate(); autoTab(this)">:<input type="number" class="p${i}-a" maxlength="1" oninput="calculate(); autoTab(this)"></td>`).join('')}
                            <td><input type="number" class="real-h real-field" maxlength="1" oninput="calculate(); autoTab(this)">:<input type="number" class="real-a real-field" maxlength="1" oninput="calculate(); autoTab(this)"></td>
                        </tr>`);
                    });
                </script>
            </tbody>
        </table>
    </div>

    <h3>Ranking Graczy</h3>
    <table class="ranking-table">
        <thead><tr><th>Gracz</th><th>3 pkt</th><th>1 pkt</th><th>0 pkt</th><th>Suma Pkt</th></tr></thead>
        <tbody id="rankingBody">
            <tr id="row1"><td>Oniszk</td><td id="id1">0</td><td id="win1">0</td><td id="bad1">0</td><td id="pts1">0</td></tr>
            <tr id="row2"><td>Sebix</td><td id="id2">0</td><td id="win2">0</td><td id="bad2">0</td><td id="pts2">0</td></tr>
            <tr id="row3"><td>Adaś</td><td id="id3">0</td><td id="win3">0</td><td id="bad3">0</td><td id="pts3">0</td></tr>
            <tr id="row4"><td>Kuba</td><td id="id4">0</td><td id="win4">0</td><td id="bad4">0</td><td id="pts4">0</td></tr>
            <tr id="row5"><td>Maksym</td><td id="id5">0</td><td id="win5">0</td><td id="bad5">0</td><td id="pts5">0</td></tr>
        </tbody>
    </table>

    <div class="extra-fields">
        <h4>Typy dodatkowe</h4>
        <script>
            const names = ["Oniszk", "Sebix", "Adaś", "Kuba", "Maksym"];
            names.forEach((name, i) => {
                document.write(`<input type="text" id="krol${i+1}" placeholder="${name}: Król strzelców" oninput="calculate()">`);
                document.write(`<input type="text" id="mistrz${i+1}" placeholder="${name}: Zwycięzca" oninput="calculate()">`);
            });
        </script>
        <hr>
        <input type="text" id="real-krol" placeholder="Faktyczny Król" oninput="calculate()" class="real-field">
        <input type="text" id="real-mistrz" placeholder="Faktyczny Zwycięzca" oninput="calculate()" class="real-field">
    </div>
    <button class="btn-save" onclick="saveData()">ZAPISZ WYNIKI</button>
</div>

<script>
    function autoTab(el) {
        if (el.value.length >= el.getAttribute("maxlength")) {
            const inputs = Array.from(document.querySelectorAll('input[type="number"]'));
            const index = inputs.indexOf(el);
            if (index > -1 && inputs[index + 1]) {
                inputs[index + 1].focus();
            }
        }
    }

    function parseDate(str) {
        const p = str.match(/(\d{2})\.(\d{2})\.(\d{2})\s(\d{2}):(\d{2})/);
        return p ? new Date(2000 + parseInt(p[3]), p[2] - 1, p[1], p[4], p[5]).getTime() : null;
    }

    function sortMatches() {
        const tbody = document.getElementById('matchBody');
        const rows = Array.from(document.querySelectorAll('.match-row'));
        rows.sort((a, b) => {
            const timeA = parseDate(a.querySelector('.match-time').value) || Infinity;
            const timeB = parseDate(b.querySelector('.match-time').value) || Infinity;
            return timeA - timeB;
        });
        rows.forEach(row => tbody.appendChild(row));
        updateCountdown();
    }

    function updateCountdown() {
        const rows = document.querySelectorAll('.match-row');
        let closestTime = null;
        const now = new Date().getTime();

        rows.forEach(row => {
            const time = parseDate(row.querySelector('.match-time').value);
            if (time && time > now && (!closestTime || time < closestTime)) closestTime = time;
        });

        const display = document.getElementById('countdown');
        if (closestTime) {
            const diff = closestTime - now;
            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            display.innerText = `Do najbliższego meczu: ${h}h ${m}m`;
            display.className = (diff < 3600000) ? 'blink' : '';
        } else {
            display.innerText = "Brak nadchodzących meczów";
            display.className = '';
        }
    }

    function calculate() {
        let stats = { pts: [0,0,0,0,0], ideal: [0,0,0,0,0], win: [0,0,0,0,0], bad: [0,0,0,0,0] };
        const now = new Date().getTime();

        document.querySelectorAll('.match-row').forEach(row => {
            const timeVal = row.querySelector('.match-time').value;
            const matchTime = parseDate(timeVal);
            const isFinished = matchTime && now > matchTime;
            
            row.querySelectorAll('input[type="number"]:not(.real-field)').forEach(input => input.readOnly = isFinished);
            row.classList.toggle('finished-match', isFinished);

            const rh = parseInt(row.querySelector('.real-h').value);
            const ra = parseInt(row.querySelector('.real-a').value);
            
            for (let i = 1; i <= 5; i++) {
                const hIn = row.querySelector('.p' + i + '-h');
                const aIn = row.querySelector('.p' + i + '-a');
                const ih = parseInt(hIn.value);
                const ia = parseInt(aIn.value);
                
                hIn.className = 'p' + i + '-h'; aIn.className = 'p' + i + '-a';

                if (!isNaN(rh) && !isNaN(ra) && !isNaN(ih) && !isNaN(ia)) {
                    if (ih === rh && ia === ra) {
                        stats.ideal[i - 1]++; stats.pts[i - 1] += 3;
                        hIn.classList.add('exact'); aIn.classList.add('exact');
                    } else if ((ih > ia && rh > ra) || (ih < ia && rh < ra) || (ih === ia && rh === ra)) {
                        stats.win[i - 1]++; stats.pts[i - 1] += 1;
                        hIn.classList.add('win'); aIn.classList.add('win');
                    } else {
                        stats.bad[i - 1]++;
                        hIn.classList.add('wrong'); aIn.classList.add('wrong');
                    }
                }
            }
        });

        const rKrol = document.getElementById('real-krol').value.trim().toLowerCase();
        const rMistrz = document.getElementById('real-mistrz').value.trim().toLowerCase();
        
        for (let i = 1; i <= 5; i++) {
            if (rKrol && document.getElementById('krol' + i).value.trim().toLowerCase() === rKrol) stats.pts[i - 1] += 5;
            if (rMistrz && document.getElementById('mistrz' + i).value.trim().toLowerCase() === rMistrz) stats.pts[i - 1] += 5;
            
            document.getElementById('id' + i).innerText = stats.ideal[i - 1];
            document.getElementById('win' + i).innerText = stats.win[i - 1];
            document.getElementById('bad' + i).innerText = stats.bad[i - 1];
            document.getElementById('pts' + i).innerText = stats.pts[i - 1];
        }
    }

    function saveData() {
        const data = { scores: Array.from(document.querySelectorAll('input')).map(i => i.value) };
        localStorage.setItem('typer2026', JSON.stringify(data));
        alert('Zapisano!');
    }

    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('typer2026'));
        if (saved) document.querySelectorAll('input').forEach((el, i) => el.value = saved.scores[i] || '');
        sortMatches();
        calculate();
        setInterval(updateCountdown, 60000);
    };
</script>
</body>
</html>
