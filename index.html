<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Mundial 2026 - Typer z Rankingiem</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #00e676; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: var(--card); padding: 20px; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 8px; border: 1px solid #333; text-align: center; }
        input { width: 30px; text-align: center; background: #2a2a2a; border: 1px solid #444; color: white; border-radius: 4px; }
        input:disabled { opacity: 0.5; }
        .exact { background-color: #2e7d32 !important; }
        .win { background-color: #f9a825 !important; }
        .wrong { background-color: #c62828 !important; }
        .ranking-table { margin-top: 30px; font-weight: bold; }
        .btn-save { width: 100%; padding: 15px; background: var(--accent); border: none; font-weight: bold; cursor: pointer; border-radius: 8px; color: #000; }
    </style>
</head>
<body>
<div class="container">
    <h1>MUNDIAL 2026 - TYPER</h1>
    <div id="extraInputs" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:20px;"></div>

    <table id="matchTable">
        <thead><tr id="headRow"></tr></thead>
        <tbody id="matchBody"></tbody>
    </table>

    <h2>RANKING</h2>
    <table class="ranking-table"><thead><tr><th>Gracz</th><th>Punkty</th></tr></thead><tbody id="rankingBody"></tbody></table>
    
    <button class="btn-save" onclick="saveData()">ZAPISZ TYPY</button>
</div>

<script>
    const players = ["Oniszk", "Sebix", "Adaś", "Kuba", "Maksym"];
    const matches = [
        { name: "Meksyk-RPA", time: "2026-06-11T21:00:00" }, { name: "Korea-Czechy", time: "2026-06-12T04:00:00" },
        { name: "Kanada-Bośnia", time: "2026-06-12T21:00:00" }, { name: "USA-Paragwaj", time: "2026-06-13T03:00:00" },
        { name: "Katar-Szwajcaria", time: "2026-06-13T21:00:00" }, { name: "Brazylia-Maroko", time: "2026-06-14T00:00:00" },
        { name: "Haiti-Szkocja", time: "2026-06-14T03:00:00" }, { name: "Australia-Turcja", time: "2026-06-14T06:00:00" },
        { name: "Niemcy-Curacao", time: "2026-06-14T19:00:00" }, { name: "Holandia-Japonia", time: "2026-06-14T22:00:00" },
        { name: "WKS-Ekwador", time: "2026-06-15T01:00:00" }, { name: "Szwecja-Tunezja", time: "2026-06-15T04:00:00" },
        { name: "Hiszpania-Ziel.Przyl.", time: "2026-06-15T18:00:00" }, { name: "Belgia-Egipt", time: "2026-06-15T21:00:00" }
    ];

    function init() {
        const extra = document.getElementById('extraInputs');
        [...players, "REAL"].forEach((p, i) => {
            extra.innerHTML += `<div style="background:#2a2a2a; padding:10px; border-radius:8px;"><b>${p}</b><br>
                <input type="text" id="k${i}" placeholder="Król" style="width:40px">
                <input type="text" id="m${i}" placeholder="Mistrz" style="width:40px"></div>`;
        });
        
        const headRow = document.getElementById('headRow');
        headRow.innerHTML = '<th>Mecz</th>' + players.map(p => `<th>${p}</th>`).join('') + '<th>REAL</th>';
        
        const tbody = document.getElementById('matchBody');
        matches.forEach((m, i) => {
            const locked = new Date() > new Date(m.time);
            let row = `<tr><td>${m.name}</td>`;
            players.forEach((_, p) => row += `<td><input type="text" class="p${p}h${i}" ${locked?'disabled':''}>:<input type="text" class="p${p}a${i}" ${locked?'disabled':''}></td>`);
            row += `<td><input type="text" class="rh${i}">:<input type="text" class="ra${i}"></td></tr>`;
            tbody.innerHTML += row;
        });
    }

    function calculate() {
        let scores = Array(players.length).fill(0);
        matches.forEach((m, i) => {
            let rh = document.querySelector(`.rh${i}`).value, ra = document.querySelector(`.ra${i}`).value;
            players.forEach((_, p) => {
                let h = document.querySelector(`.p${p}h${i}`), a = document.querySelector(`.p${p}a${i}`);
                h.classList.remove('exact', 'win', 'wrong'); a.classList.remove('exact', 'win', 'wrong');
                if(h.value && a.value && rh && ra) {
                    if(h.value == rh && a.value == ra) { scores[p]+=3; h.classList.add('exact'); a.classList.add('exact'); }
                    else if((h.value > a.value && rh > ra) || (h.value < a.value && rh < ra) || (h.value == a.value && rh == ra)) { scores[p]+=1; h.classList.add('win'); a.classList.add('win'); }
                    else { h.classList.add('wrong'); a.classList.add('wrong'); }
                }
            });
        });
        // Punkty za Króla i Mistrza
        players.forEach((_, i) => {
            if(document.getElementById('k'+i).value && document.getElementById('k'+i).value == document.getElementById('k5').value) scores[i]+=5;
            if(document.getElementById('m'+i).value && document.getElementById('m'+i).value == document.getElementById('m5').value) scores[i]+=5;
        });
        // Render tabeli rankingu
        const tbody = document.getElementById('rankingBody');
        tbody.innerHTML = players.map((p, i) => ({p, s: scores[i]})).sort((a,b) => b.s - a.s)
            .map(x => `<tr><td>${x.p}</td><td>${x.s}</td></tr>`).join('');
    }

    function saveData() {
        let data = {}; document.querySelectorAll('input').forEach(i => data[i.id || i.className] = i.value);
        localStorage.setItem('typer2026', JSON.stringify(data));
        alert('Zapisano!');
    }

    window.onload = () => { 
        init(); 
        let s = JSON.parse(localStorage.getItem('typer2026') || '{}');
        Object.keys(s).forEach(k => { let el = document.getElementById(k) || document.querySelector('.'+k); if(el) el.value = s[k]; });
        document.querySelectorAll('input').forEach(i => i.oninput = calculate);
        calculate();
    };
</script>
</body>
</html>
