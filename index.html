<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typer Mundial 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f0f2f5; color: #333; padding: 15px; margin: 0; }
        h1 { text-align: center; color: #1a3c6e; text-transform: uppercase; }
        .typer-container { background: #fff; border-radius: 12px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        
        /* Obsługa przewijania dla dużej ilości meczów */
        .table-wrapper { max-height: 500px; overflow-y: auto; margin-bottom: 20px; border: 1px solid #ddd; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a3c6e; color: #fff; padding: 12px 5px; font-size: 0.9rem; position: sticky; top: 0; }
        td { padding: 10px 5px; border-bottom: 1px solid #eee; text-align: center; }
        
        .score-input { display: flex; align-items: center; justify-content: center; gap: 4px; }
        input[type=number] { width: 40px; height: 40px; border: 2px solid #ddd; border-radius: 8px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .exact { background-color: #28a745 !important; color: white !important; border-color: #1e7e34 !important; }
        .win { background-color: #ffc107 !important; color: #333 !important; border-color: #d39e00 !important; }
        .wrong { background-color: #dc3545 !important; color: white !important; border-color: #bd2130 !important; }
        .real-field { background-color: #e9ecef !important; }
        
        .ranking-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .ranking-table th, .ranking-table td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        
        .leader { background-color: #e8f5e9 !important; font-weight: bold; }
        
        .extra-fields { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .extra-fields input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 15px; background: #1a3c6e; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="typer-container">
    <h1>Mundial 2026</h1>
    
    <div class="table-wrapper">
        <table id="typerTable">
            <thead><tr><th>Godz.</th><th>Mecz</th><th>O1</th><th>O2</th><th>O3</th><th>O4</th><th>Real</th></tr></thead>
            <tbody id="matchBody">
                <tr data-match="1">
                    <td>17:00</td><td><small>Grupa A</small><br><strong>Meksyk-RPA</strong></td>
                    <td><div class="score-input"><input type="number" class="o1-h" oninput="calculate()">:<input type="number" class="o1-a" oninput="calculate()"></div></td>
                    <td><div class="score-input"><input type="number" class="o2-h" oninput="calculate()">:<input type="number" class="o2-a" oninput="calculate()"></div></td>
                    <td><div class="score-input"><input type="number" class="o3-h" oninput="calculate()">:<input type="number" class="o3-a" oninput="calculate()"></div></td>
                    <td><div class="score-input"><input type="number" class="o4-h" oninput="calculate()">:<input type="number" class="o4-a" oninput="calculate()"></div></td>
                    <td><div class="score-input"><input type="number" class="real-h real-field" oninput="calculate()">:<input type="number" class="real-a real-field" oninput="calculate()"></div></td>
                </tr>
                <tr data-match="2">
                    <td>20:00</td><td><small>Grupa A</small><br><strong>Francja-Polska</strong></td>
                    <td><div class="score-input"><input type="number" class="o1-h" oninput="calculate()">:<input type="number" class="o1-a" oninput="calculate()"></div></td>
                    <td><div class="score-input"><input type="number" class="o2-h" oninput="calculate()">:<input type="number" class="o2-a" oninput="calculate()"></div></td>
                    <td><div class="score-input"><input type="number" class="o3-h" oninput="calculate()">:<input type="number" class="o3-a" oninput="calculate()"></div></td>
                    <td><div class="score-input"><input type="number" class="o4-h" oninput="calculate()">:<input type="number" class="o4-a" oninput="calculate()"></div></td>
                    <td><div class="score-input"><input type="number" class="real-h real-field" oninput="calculate()">:<input type="number" class="real-a real-field" oninput="calculate()"></div></td>
                </tr>
                <tr data-match="3">
                    <td>22:00</td><td><small>Grupa B</small><br><strong>Anglia-USA</strong></td>
                    <td><div class="score-input"><input type="number" class="o1-h" oninput="calculate()">:<input type="number" class="o1-a" oninput="calculate()"></div></td>
                    <td><div class="score-input"><input type="number" class="o2-h" oninput="calculate()">:<input type="number" class="o2-a" oninput="calculate()"></div></td>
                    <td><div class="score-input"><input type="number" class="o3-h" oninput="calculate()">:<input type="number" class="o3-a" oninput="calculate()"></div></td>
                    <td><div class="score-input"><input type="number" class="o4-h" oninput="calculate()">:<input type="number" class="o4-a" oninput="calculate()"></div></td>
                    <td><div class="score-input"><input type="number" class="real-h real-field" oninput="calculate()">:<input type="number" class="real-a real-field" oninput="calculate()"></div></td>
                </tr>
            </tbody>
        </table>
    </div>

    <h3>Ranking Graczy</h3>
    <table class="ranking-table">
        <thead><tr style="background:#f8f9fa;"><th>Gracz</th><th>3 pkt</th><th>1 pkt</th><th>0 pkt</th><th>Suma Pkt</th></tr></thead>
        <tbody id="rankingBody">
            <tr id="row1"><td>Osoba 1</td><td id="id1">0</td><td id="win1">0</td><td id="bad1">0</td><td id="pts1">0</td></tr>
            <tr id="row2"><td>Osoba 2</td><td id="id2">0</td><td id="win2">0</td><td id="bad2">0</td><td id="pts2">0</td></tr>
            <tr id="row3"><td>Osoba 3</td><td id="id3">0</td><td id="win3">0</td><td id="bad3">0</td><td id="pts3">0</td></tr>
            <tr id="row4"><td>Osoba 4</td><td id="id4">0</td><td id="win4">0</td><td id="bad4">0</td><td id="pts4">0</td></tr>
        </tbody>
    </table>

    <div class="extra-fields">
        <h4>Typy dodatkowe</h4>
        <input type="text" id="krol1" placeholder="Osoba 1: Król strzelców" oninput="calculate()">
        <input type="text" id="mistrz1" placeholder="Osoba 1: Zwycięzca" oninput="calculate()">
        <input type="text" id="krol2" placeholder="Osoba 2: Król strzelców" oninput="calculate()">
        <input type="text" id="mistrz2" placeholder="Osoba 2: Zwycięzca" oninput="calculate()">
        <input type="text" id="krol3" placeholder="Osoba 3: Król strzelców" oninput="calculate()">
        <input type="text" id="mistrz3" placeholder="Osoba 3: Zwycięzca" oninput="calculate()">
        <input type="text" id="krol4" placeholder="Osoba 4: Król strzelców" oninput="calculate()">
        <input type="text" id="mistrz4" placeholder="Osoba 4: Zwycięzca" oninput="calculate()">
        <hr>
        <h4>Wyniki faktyczne</h4>
        <input type="text" id="real-krol" placeholder="Faktyczny Król Strzelców" oninput="calculate()" class="real-field">
        <input type="text" id="real-mistrz" placeholder="Faktyczny Zwycięzca" oninput="calculate()" class="real-field">
    </div>
    <button class="btn-save" onclick="saveData()">ZAPISZ WYNIKI</button>
</div>

<script>
    function calculate() {
        let stats = {pts: [0,0,0,0], ideal: [0,0,0,0], win: [0,0,0,0], bad: [0,0,0,0]};
        
        document.querySelectorAll('tr[data-match]').forEach(row => {
            const rh = parseInt(row.querySelector('.real-h').value);
            const ra = parseInt(row.querySelector('.real-a').value);
            
            for(let i=1; i<=4; i++) {
                const hIn = row.querySelector('.o'+i+'-h');
                const aIn = row.querySelector('.o'+i+'-a');
                const ih = parseInt(hIn.value);
                const ia = parseInt(aIn.value);
                
                hIn.className = 'o'+i+'-h'; aIn.className = 'o'+i+'-a';
                if (isNaN(rh) || isNaN(ra)) continue;
                if (isNaN(ih) || isNaN(ia)) continue;
                
                if(ih === rh && ia === ra) { 
                    stats.ideal[i-1]++; stats.pts[i-1] += 3; hIn.classList.add('exact'); aIn.classList.add('exact');
                } else if((ih > ia && rh > ra) || (ih < ia && rh < ra) || (ih === ia && rh === ra)) { 
                    stats.win[i-1]++; stats.pts[i-1] += 1; hIn.classList.add('win'); aIn.classList.add('win');
                } else {
                    stats.bad[i-1]++; hIn.classList.add('wrong'); aIn.classList.add('wrong');
                }
            }
        });

        const realKrol = document.getElementById('real-krol').value.trim().toLowerCase();
        const realMistrz = document.getElementById('real-mistrz').value.trim().toLowerCase();

        for(let i=1; i<=4; i++) {
            const krolIn = document.getElementById('krol'+i);
            const mistrzIn = document.getElementById('mistrz'+i);
            
            if (realKrol !== "") {
                if (krolIn.value.trim().toLowerCase() === realKrol) { stats.pts[i-1] += 5; krolIn.className = 'exact'; }
                else { krolIn.className = 'wrong'; }
            } else { krolIn.className = ''; }
            
            if (realMistrz !== "") {
                if (mistrzIn.value.trim().toLowerCase() === realMistrz) { stats.pts[i-1] += 5; mistrzIn.className = 'exact'; }
                else { mistrzIn.className = 'wrong'; }
            } else { mistrzIn.className = ''; }

            document.getElementById('id'+i).innerText = stats.ideal[i-1];
            document.getElementById('win'+i).innerText = stats.win[i-1];
            document.getElementById('bad'+i).innerText = stats.bad[i-1];
            document.getElementById('pts'+i).innerText = stats.pts[i-1];
        }

        const tbody = document.getElementById('rankingBody');
        const rows = Array.from(tbody.querySelectorAll('tr'));
        rows.sort((a, b) => parseInt(b.querySelector('[id^="pts"]').innerText) - parseInt(a.querySelector('[id^="pts"]').innerText));
        rows.forEach(row => {
            row.classList.remove('leader');
            tbody.appendChild(row);
        });
        if(parseInt(rows[0].querySelector('[id^="pts"]').innerText) > 0) rows[0].classList.add('leader');
    }

    function saveData() {
        const data = { scores: Array.from(document.querySelectorAll('input[type=number]')).map(i => i.value), texts: Array.from(document.querySelectorAll('.extra-fields input')).map(i => i.value) };
        localStorage.setItem('typer2026_data', JSON.stringify(data));
        alert('Zapisano!');
    }

    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('typer2026_data'));
        if(saved) {
            const numInputs = document.querySelectorAll('input[type=number]');
            saved.scores.forEach((val, i) => { if(numInputs[i]) numInputs[i].value = val; });
            const txtInputs = document.querySelectorAll('.extra-fields input');
            saved.texts.forEach((val, i) => { if(txtInputs[i]) txtInputs[i].value = val; });
            calculate();
        }
    };
</script>
</body>
</html>
