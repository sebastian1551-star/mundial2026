<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Typer Mundial 2026 - Panel</title>
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f0f2f5; padding: 10px; }
        .typer-container { background: #fff; padding: 20px; border-radius: 12px; max-width: 1000px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.9rem; }
        th { background: #1a3c6e; color: #fff; padding: 10px; }
        td { padding: 8px; border: 1px solid #ddd; text-align: center; }
        input[type=number] { width: 30px; height: 30px; text-align: center; border: 1px solid #ccc; border-radius: 4px; }
        .real { background-color: #e9ecef; }
        .extra-section { display: flex; justify-content: space-around; background: #eef; padding: 10px; border-radius: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .extra-box { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .rank-first { background-color: #28a745 !important; color: white; font-weight: bold; }
        .rank-last { background-color: #dc3545 !important; color: white; }
        #countdown { text-align: center; font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; color: #1a3c6e; }
        .btn-save { width: 100%; padding: 15px; background: #1a3c6e; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="typer-container">
    <div id="countdown">Ładowanie...</div>
    
    <div class="extra-section" id="extraInputs">
        </div>

    <h1>MUNDIAL 2026 - TYPER</h1>
    <table>
        <thead><tr><th>Godz.</th><th>Mecz</th><th>Oniszk</th><th>Sebix</th><th>Adaś</th><th>Kuba</th><th>Maksym</th><th>Real</th></tr></thead>
        <tbody id="matchBody"></tbody>
    </table>

    <h3>Ranking Graczy</h3>
    <table class="ranking-table">
        <thead><tr><th>Miejsce</th><th>Gracz</th><th>Punkty</th></tr></thead>
        <tbody id="rankingBody">
            <tr id="r1"><td>1</td><td>Oniszk</td><td class="pts">0</td></tr>
            <tr id="r2"><td>2</td><td>Sebix</td><td class="pts">0</td></tr>
            <tr id="r3"><td>3</td><td>Adaś</td><td class="pts">0</td></tr>
            <tr id="r4"><td>4</td><td>Kuba</td><td class="pts">0</td></tr>
            <tr id="r5"><td>5</td><td>Maksym</td><td class="pts">0</td></tr>
        </tbody>
    </table>
    <button class="btn-save" onclick="saveData()">ZAPISZ WYNIKI</button>
</div>

<script>
    const players = ["Oniszk", "Sebix", "Adaś", "Kuba", "Maksym"];
    const matches = [
        { name: "Meksyk - RPA", time: "2026-06-11T21:00:00" },
        { name: "Korea Płd - Czechy", time: "2026-06-12T04:00:00" },
        { name: "Kanada - Bośnia", time: "2026-06-12T21:00:00" },
        { name: "USA - Paragwaj", time: "2026-06-13T03:00:00" },
        { name: "Katar - Szwajcaria", time: "2026-06-13T21:00:00" },
        { name: "Brazylia - Maroko", time: "2026-06-14T00:00:00" },
        { name: "Haiti - Szkocja", time: "2026-06-14T03:00:00" },
        { name: "Australia - Turcja", time: "2026-06-14T06:00:00" },
        { name: "Niemcy - Curacao", time: "2026-06-14T19:00:00" },
        { name: "Holandia - Japonia", time: "2026-06-14T22:00:00" },
        { name: "WKS - Ekwador", time: "2026-06-15T01:00:00" },
        { name: "Szwecja - Tunezja", time: "2026-06-15T04:00:00" },
        { name: "Hiszpania - Rep. Zielonego Przylądka", time: "2026-06-15T18:00:00" },
        { name: "Belgia - Egipt", time: "2026-06-15T21:00:00" }
    ];

    function init() {
        // Extra Inputs
        const extra = document.getElementById('extraInputs');
        players.forEach((p, i) => {
            extra.innerHTML += `<div class="extra-box"><strong>${p}</strong>
                <input type="text" id="krol${i}" placeholder="Król strzelców" oninput="calculate()">
                <input type="text" id="mistrz${i}" placeholder="Zwycięzca" oninput="calculate()"></div>`;
        });
        extra.innerHTML += `<div class="extra-box" style="border-left:2px solid #aaa; padding-left:10px"><strong>REAL</strong>
            <input type="text" id="realKrol" placeholder="Faktyczny Król" oninput="calculate()" class="real">
            <input type="text" id="realMistrz" placeholder="Faktyczny Mistrz" oninput="calculate()" class="real"></div>`;

        // Matches
        const tbody = document.getElementById('matchBody');
        matches.forEach((m, i) => {
            let row = `<tr><td>${m.time.substring(11, 16)}</td><td>${m.name}</td>`;
            players.forEach((_, p) => row += `<td><input type="number" class="p${p}h" data-m="${i}">:<input type="number" class="p${p}a" data-m="${i}"></td>`);
            row += `<td><input type="number" class="rh" data-m="${i}" class="real">:<input type="number" class="ra" data-m="${i}" class="real"></td></tr>`;
            tbody.innerHTML += row;
        });
    }

    function calculate() {
        let scores = [0,0,0,0,0];
        const rKrol = document.getElementById('realKrol').value.toLowerCase();
        const rMistrz = document.getElementById('realMistrz').value.toLowerCase();

        // Punkty za mecze
        matches.forEach((m, i) => {
            let rh = document.querySelector(`.rh[data-m="${i}"]`).value;
            let ra = document.querySelector(`.ra[data-m="${i}"]`).value;
            if(rh === "" || ra === "") return;
            players.forEach((_, p) => {
                let ph = document.querySelector(`.p${p}h[data-m="${i}"]`).value;
                let pa = document.querySelector(`.p${p}a[data-m="${i}"]`).value;
                if(ph === "" || pa === "") return;
                if(ph == rh && pa == ra) scores[p] += 3;
                else if((ph > pa && rh > ra) || (ph < pa && rh < ra) || (ph == pa && rh == ra)) scores[p] += 1;
            });
        });

        // Punkty za typy dodatkowe
        players.forEach((_, i) => {
            if(rKrol && document.getElementById('krol'+i).value.toLowerCase() === rKrol) scores[i] += 5;
            if(rMistrz && document.getElementById('mistrz'+i).value.toLowerCase() === rMistrz) scores[i] += 5;
        });

        let rankings = players.map((n, i) => ({n, s: scores[i]}));
        rankings.sort((a,b) => b.s - a.s);

        const rBody = document.getElementById('rankingBody');
        rBody.innerHTML = "";
        rankings.forEach((r, i) => {
            let cls = i === 0 ? "rank-first" : (i === 4 ? "rank-last" : "");
            rBody.innerHTML += `<tr class="${cls}"><td>${i+1}</td><td>${r.n}</td><td>${r.s}</td></tr>`;
        });
    }

    function updateTimer() {
        const now = new Date();
        let next = matches.map(m => new Date(m.time)).find(t => t > now);
        if(!next) { document.getElementById('countdown').innerText = "Mecze w toku"; return; }
        let diff = next - now;
        let d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
        document.getElementById('countdown').innerText = `Do najbliższego meczu: ${d}d ${h}h ${m}m ${s}s`;
    }

    function saveData() {
        let data = {};
        document.querySelectorAll('input').forEach(i => data[i.id || (i.className + i.dataset.m)] = i.value);
        localStorage.setItem('typer2026', JSON.stringify(data));
        alert('Zapisano!');
    }

    window.onload = () => {
        init();
        let saved = JSON.parse(localStorage.getItem('typer2026') || "{}");
        document.querySelectorAll('input').forEach(i => i.value = saved[i.id || (i.className + i.dataset.m)] || "");
        document.querySelectorAll('input').forEach(i => i.oninput = () => { calculate(); });
        setInterval(updateTimer, 1000);
        calculate();
    };
</script>
</body>
</html>
